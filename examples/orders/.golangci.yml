version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nilerr
    - unconvert
    - unparam
    - whitespace

  settings:
    gosec:
      excludes:
        - G104
        - G114
    gocritic:
      disabled-checks:
        - ifElseChain

  exclusions:
    generated: lax
    rules:
      - path: _test\.go$
        linters:
          - gosec
          - unparam
      - path: cmd/
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/slam0504/go-ddd-adapters/examples/orders
        - github.com/slam0504/go-ddd-adapters

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
