name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [".", "examples/orders"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          working-directory: ${{ matrix.module }}

  build-test:
    name: build + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [".", "examples/orders"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: go build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: go test
        working-directory: ${{ matrix.module }}
        run: go test -race ./...

  integration-test:
    name: integration (testcontainers)
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: integration tests
        working-directory: examples/orders
        run: go test -tags=integration -race ./integration/...
